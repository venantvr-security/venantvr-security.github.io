<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM - {{ page.repo_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/qcm.css' | relative_url }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-3 px-lg-5">
            <a class="navbar-brand text-primary fw-bold" href="{{ '/' | relative_url }}">venantvr-security</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ '/' | relative_url }}">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ page.readme_url }}">README</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Password Protection Overlay -->
    <div id="password-overlay" class="password-overlay">
        <div class="password-modal mx-3">
            <h2 class="text-primary mb-3">QCM Protégé</h2>
            <p class="text-muted mb-4">Entrez le mot de passe pour accéder au QCM</p>
            <input type="password" id="password-input" class="form-control mb-3" placeholder="Mot de passe" onkeypress="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()" class="btn btn-primary w-100">Accéder</button>
            <p id="password-error" class="text-danger mt-3 mb-0"></p>
        </div>
    </div>

    <main class="container-fluid px-3 px-lg-5 py-4" id="qcm-main" style="display:none;">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <h1 class="mb-3">QCM: {{ page.repo_name }}</h1>
                <p class="text-muted mb-4">{{ page.description }}</p>

                <div class="qcm-stats d-flex justify-content-between p-3 rounded mb-4">
                    <span id="score" class="text-success fw-bold">Score: 0/<span class="total-q"></span></span>
                    <span id="progress" class="text-primary fw-bold">Question 1/<span class="total-q"></span></span>
                </div>

                <div id="qcm-content">
                    <!-- Questions will be loaded here -->
                </div>

                <div class="qcm-controls d-flex gap-2 mt-4">
                    <button id="prev-btn" class="btn btn-outline-light" disabled>Précédent</button>
                    <button id="next-btn" class="btn btn-primary">Suivant</button>
                    <button id="finish-btn" class="btn btn-success" style="display:none;">Voir les résultats</button>
                </div>

                <div id="results" class="mt-4 p-4 rounded" style="display:none; background-color: rgba(45, 45, 61, 0.85);">
                    <h2 class="text-center mb-4">Résultats finaux</h2>
                    <div id="final-score"></div>
                    <button id="restart-btn" class="btn btn-primary d-block mx-auto mt-4">Recommencer</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 venantvr-security</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const CORRECT_HASH = '26988a1044396bdfc250e0b46d6060b9c2773d41842feda1b9470fa9fbbf25b4';

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const input = document.getElementById('password-input').value;
            const hash = await sha256(input);

            if (hash === CORRECT_HASH) {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('qcm-main').style.display = 'block';
                sessionStorage.setItem('qcm_auth', 'true');
                initQCM();
            } else {
                document.getElementById('password-error').textContent = 'Mot de passe incorrect';
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('qcm_auth') === 'true') {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('qcm-main').style.display = 'block';
                initQCM();
            } else {
                document.getElementById('password-input').focus();
            }
        });
    </script>

    <script>
        const questions = {{ page.questions | jsonify }};
        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let correctCount = 0;

        function initQCM() {
            document.querySelectorAll('.total-q').forEach(el => el.textContent = questions.length);
            renderQuestion();
        }

        function getExplanation(q, selectedIdx) {
            const isCorrect = selectedIdx === q.answer;
            const correctOption = q.options[q.answer];
            const selectedOption = q.options[selectedIdx];

            if (isCorrect) {
                return `<strong>${correctOption}</strong> est la bonne réponse.`;
            } else {
                return `Vous avez sélectionné "<strong>${selectedOption}</strong>", mais ce n'est pas correct.<div class="correct-answer mt-2 pt-2 border-top border-secondary">La bonne réponse est : <strong class="text-success">${correctOption}</strong></div>`;
            }
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const hasAnswered = answers[currentQuestion] !== null;

            let html = `
                <div class="question-card p-4 rounded" style="background-color: rgba(45, 45, 61, 0.85);">
                    <h5 class="text-primary text-uppercase mb-3">Question ${currentQuestion + 1}/${questions.length}</h5>
                    <p class="fs-5 mb-4">${q.question}</p>
                    <div class="options d-flex flex-column gap-2">
            `;

            q.options.forEach((opt, idx) => {
                let optClass = 'option p-3 rounded border';
                const checked = answers[currentQuestion] === idx ? 'checked' : '';

                if (hasAnswered) {
                    optClass += ' answered pe-none opacity-75';
                    if (idx === q.answer) {
                        optClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[currentQuestion] === idx) {
                        if (idx === q.answer) {
                            optClass += ' border-success bg-success bg-opacity-25';
                        } else {
                            optClass += ' border-danger bg-danger bg-opacity-25';
                        }
                    }
                } else {
                    optClass += ' border-secondary';
                }

                html += `
                    <label class="${optClass}" style="cursor: ${hasAnswered ? 'default' : 'pointer'};">
                        <input type="radio" name="q${currentQuestion}" value="${idx}" ${checked} ${hasAnswered ? 'disabled' : ''} class="me-2">
                        ${opt}
                    </label>
                `;
            });

            html += '</div>';

            if (hasAnswered) {
                const isCorrect = answers[currentQuestion] === q.answer;
                html += `
                    <div class="feedback-box mt-4 p-3 rounded ${isCorrect ? 'bg-success' : 'bg-danger'} bg-opacity-10 border ${isCorrect ? 'border-success' : 'border-danger'}">
                        <h5 class="${isCorrect ? 'text-success' : 'text-danger'} mb-2">${isCorrect ? '✓ Correct !' : '✗ Incorrect'}</h5>
                        <div class="explanation">${getExplanation(q, answers[currentQuestion])}</div>
                    </div>
                `;
            } else {
                html += `<div class="feedback-box" id="feedback-box"></div>`;
            }

            html += '</div>';
            document.getElementById('qcm-content').innerHTML = html;

            if (!hasAnswered) {
                document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(input => {
                    input.addEventListener('change', (e) => {
                        handleAnswer(parseInt(e.target.value));
                    });
                });
            }

            updateUI();
        }

        function handleAnswer(selectedIdx) {
            const q = questions[currentQuestion];
            answers[currentQuestion] = selectedIdx;

            if (selectedIdx === q.answer) {
                correctCount++;
            }

            document.querySelectorAll('.option').forEach((opt, idx) => {
                opt.classList.add('answered', 'pe-none', 'opacity-75');
                opt.querySelector('input').disabled = true;

                if (idx === q.answer) {
                    opt.classList.add('border-success', 'bg-success', 'bg-opacity-10');
                }
                if (idx === selectedIdx) {
                    if (idx === q.answer) {
                        opt.classList.add('border-success', 'bg-success', 'bg-opacity-25');
                    } else {
                        opt.classList.add('border-danger', 'bg-danger', 'bg-opacity-25');
                    }
                }
            });

            const isCorrect = selectedIdx === q.answer;
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.className = `feedback-box mt-4 p-3 rounded ${isCorrect ? 'bg-success' : 'bg-danger'} bg-opacity-10 border ${isCorrect ? 'border-success' : 'border-danger'}`;
            feedbackBox.innerHTML = `
                <h5 class="${isCorrect ? 'text-success' : 'text-danger'} mb-2">${isCorrect ? '✓ Correct !' : '✗ Incorrect'}</h5>
                <div class="explanation">${getExplanation(q, selectedIdx)}</div>
            `;

            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerHTML = `Score: ${correctCount}/<span class="total-q">${questions.length}</span>`;
            document.getElementById('progress').innerHTML = `Question ${currentQuestion + 1}/<span class="total-q">${questions.length}</span>`;
            document.getElementById('prev-btn').disabled = currentQuestion === 0;

            const isLastQuestion = currentQuestion === questions.length - 1;
            document.getElementById('next-btn').style.display = isLastQuestion ? 'none' : 'inline-block';
            document.getElementById('finish-btn').style.display = isLastQuestion ? 'inline-block' : 'none';
        }

        function showResults() {
            const percentage = Math.round((correctCount / questions.length) * 100);
            let grade = '';
            let emoji = '';
            if (percentage >= 90) { grade = 'Excellent !'; emoji = '🏆'; }
            else if (percentage >= 70) { grade = 'Bien !'; emoji = '👍'; }
            else if (percentage >= 50) { grade = 'Passable'; emoji = '📚'; }
            else { grade = 'À revoir'; emoji = '💪'; }

            document.getElementById('final-score').innerHTML = `
                <div class="text-center">
                    <div class="display-4 text-primary fw-bold">${correctCount}/${questions.length}</div>
                    <div class="fs-4 text-muted">(${percentage}%)</div>
                    <div class="fs-3 text-success mt-2">${emoji} ${grade}</div>
                </div>
            `;
            document.getElementById('results').style.display = 'block';
            document.querySelector('.qcm-controls').style.display = 'none';
            document.getElementById('qcm-content').style.display = 'none';
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        });

        document.getElementById('finish-btn').addEventListener('click', showResults);

        document.getElementById('restart-btn').addEventListener('click', () => {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            correctCount = 0;
            document.getElementById('results').style.display = 'none';
            document.getElementById('qcm-content').style.display = 'block';
            document.querySelector('.qcm-controls').style.display = 'flex';
            renderQuestion();
        });

        (function() {
            var img = new Image();
            img.onload = function() {
                document.body.classList.add('bg-loaded');
            };
            img.src = '{{ "/assets/images/background.webp" | relative_url }}';
        })();
    </script>
</body>
</html>
