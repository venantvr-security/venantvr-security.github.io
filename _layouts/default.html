<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-3 px-lg-5">
            <a class="navbar-brand text-primary fw-bold" href="{{ '/' | relative_url }}">venantvr-security</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ '/' | relative_url }}">Accueil</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-3 px-lg-5 py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                {{ content }}
            </div>
        </div>
    </main>

    <footer class="text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 venantvr-security - Outils de sécurité informatique</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        hljs.highlightAll();
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#6c5ce7',
                primaryTextColor: '#fff',
                primaryBorderColor: '#6c5ce7',
                lineColor: '#a29bfe',
                secondaryColor: '#2d2d3d',
                tertiaryColor: '#1a1a2e'
            }
        });
    </script>
    <script>
        (function() {
            var img = new Image();
            img.onload = function() {
                document.body.classList.add('bg-loaded');
            };
            img.src = '{{ "/assets/images/background.webp" | relative_url }}';
        })();
    </script>
</body>
</html>
